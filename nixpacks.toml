# Si en Railway el "Root Directory" queda en la raíz del repo (/) en lugar de `web/`,
# Nixpacks no encuentra Node y el build falla en segundos. Estas fases construyen ./web.
providers = []

[phases.setup]
nixPkgs = ["nodejs", "openssl"]

[phases.install]
dependsOn = ["setup"]
cmds = ["cd web && npm ci"]

[phases.build]
dependsOn = ["install"]
cmds = ["cd web && npm run build"]
